<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Secure Access | Dwarf Plug</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#050a05;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono', monospace;
    overflow:hidden;
    color:#00ff99;
  }

  /* Scanlines effect */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0.2),rgba(0,0,0,0.2) 1px,transparent 1px,transparent 3px);
    pointer-events:none;
    z-index:10;
  }

  .terminal-wrap {
    width: 320px;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  .status-line {
    font-size: 12px;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(5px);
    animation: lineIn 0.1s forwards;
  }

  @keyframes lineIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .progress-container {
    margin-top: 15px;
    height: 2px;
    width: 100%;
    background: rgba(0, 255, 153, 0.1);
    position: relative;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: #00ff99;
    box-shadow: 0 0 10px #00ff99;
    animation: loadProgress 0.8s cubic-bezier(0.1, 0.7, 1.0, 0.1) forwards;
  }

  @keyframes loadProgress {
    0% { width: 0%; }
    50% { width: 85%; }
    100% { width: 100%; }
  }

  .glitch-mascot {
    width: 40px;
    height: 40px;
    margin-bottom: 20px;
    opacity: 0.5;
    filter: grayscale(1) contrast(2);
  }

  .access-granted {
    margin-top: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 14px;
    display: none;
  }
</style>
</head>
<body>
  <div class="terminal-wrap">
    <img src="imgs/mascot.jpg" class="glitch-mascot" alt="">
    <div id="terminal"></div>
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
    <div id="granted" class="access-granted">Access Granted</div>
  </div>

  <script>
    const lines = [
      "> INITIALIZING DISCREET TUNNEL...",
      "> BYPASSING REGIONAL FILTERS...",
      "> ENCRYPTING SESSION...",
      "> CONNECTION STABLE."
    ];
    
    const container = document.getElementById('terminal');
    
    lines.forEach((text, i) => {
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = 'status-line';
        div.textContent = text;
        div.style.animationDelay = `${i * 0.1}s`;
        container.appendChild(div);
      }, i * 150);
    });

    setTimeout(() => {
      document.getElementById('granted').style.display = 'block';
    }, 700);

    setTimeout(() => {
      const urlParams = new URLSearchParams(window.location.search);
      const next = urlParams.get('next') || 'index.html';
      window.location.href = next;
    }, 750);
  </script>
</body>
</html>
